<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Notifications</h1>

<div class="container">

    <div class="box">
        <div class="notification-toolbar">
            <div>
                <h3>Incoming Active Alerts</h3>
            </div>
            <div class="toolbar-actions">
                <button class="clear-btn" onclick="clearNotifications()">Clear</button>
                <div class="notification-icon" title="Unread notifications">
                    🔔<span id="notification-badge" class="circle-badge"></span>
                </div>
            </div>
        </div>
        <ul id="notifications-display"></ul>
    </div>

    <div class="box">
        <h2>Send a new notification</h2>

        <label for="target-user">Receiver username:</label>
        <input type="text" id="target-user" placeholder="Receiver's username">

        <label for="msg">Message Context:</label>
        <textarea id="msg" rows="3" placeholder="Type notification content here..."></textarea>

        <button onclick="sendNotificationViaRest()">Send Notification</button>
    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
